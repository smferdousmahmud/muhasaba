<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhasasba</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <h1>Muhasaba Calendar</h1>
    <div class="debt-panel">
        <form id="add-debt-form">
            <h3>Add Debt</h3>
            <div class="field">
                <label for="creditor">Creditor</label>
                <input id="creditor" name="creditor" type="text" required>
            </div>
            <div class="field">
                <label for="amount">Amount</label>
                <input id="amount" name="amount" type="number" step="0.01" required>
            </div>
            <div class="field">
                <label for="filter">Filter</label>
                <select id="filter" name="filter">
                    <option value="yes">Yes</option>
                    <option value="no" selected>No</option>
                </select>
            </div>
            <div class="actions">
                <button type="submit">Add</button>
            </div>
        </form>
    </div>
    <div id="calendar"></div>
    <script>
        function generateCalendar(year, month) {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            const date = new Date(year, month, 1);
            const monthNames = ["January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"];
            const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
            let html = '<h2>' + monthNames[month] + ' ' + year + '</h2>';
            html += '<table>';
            html += '<tr>';
            for (let i = 0; i < 7; i++) {
                html += '<th>' + dayNames[i] + '</th>';
            }
            html += '</tr><tr>';
            let day = 1;
            for (let i = 0; i < 42; i++) {
                if (i % 7 === 0 && i !== 0) {
                    html += '</tr><tr>';
                }
                if (i < date.getDay() || day > new Date(year, month + 1, 0).getDate()) {
                    html += '<td></td>';
                } else {
                    const isToday = year === now.getFullYear() && month === now.getMonth() && day === now.getDate();
                    const classAttr = isToday ? ' class="today"' : '';
                    html += '<td' + classAttr + '>' + day + '</td>';
                    day++;
                }
            }
            html += '</tr></table>';
            calendar.innerHTML = html;
            // trigger a short fade-in animation each time the calendar is regenerated
            calendar.classList.remove('fade-in');
            void calendar.offsetWidth;
            calendar.classList.add('fade-in');
        }
        const now = new Date();
        generateCalendar(now.getFullYear(), now.getMonth());
        // Add-debt form handling
        const addDebtForm = document.getElementById('add-debt-form');
        if (addDebtForm) {
            addDebtForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const data = {
                    creditor: document.getElementById('creditor').value,
                    amount: parseFloat(document.getElementById('amount').value || 0),
                    filter: document.getElementById('filter').value
                };
                console.log('Add debt:', data);
                alert('Debt added: ' + data.creditor + ' — ' + data.amount + ' (filter: ' + data.filter + ')');
                addDebtForm.reset();
            });
        }
    </script>
</body>
</html>
